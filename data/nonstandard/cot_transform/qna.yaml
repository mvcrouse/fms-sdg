task_name: cot_compositional_transform
data_builder: db_composition
task_files:
  - data/generation/code/apis/glaive/detection/single_api/qna.yaml
  - data/generation/code/apis/glaive/detection/yes_no/qna.yaml
  - data/generation/code/apis/glaive/sequencing/parallel_multiple/qna.yaml
  - data/generation/code/sql/nl2sql/orders/qna.yaml
  - data/transformation/cot/qna.yaml
tasks:
  api_single_detection:
    instruction_format:
      input: "SYSTEM: You are a helpful assistant with access to the following function calls. Your task is to produce a sequence of function calls necessary to generate response to the user utterance. Use the following function calls as required and return only function \"name\" with empty \"arguments\" dictionary in your response.\n<|function_call_library|>\n{{api_specifications}}\n\nUSER: {{input}}\nASSISTANT: "
      output: "{{output}}"
  api_yes_no:
    instruction_format:
      input: "SYSTEM: You are a helpful assistant with access to the following function calls. Your task is to produce a sequence of function calls necessary to generate response to the user utterance. Use the following function calls as required and return only function \"name\" with empty \"arguments\" dictionary in your response.\n<|function_call_library|>\n{{api_specifications}}\n\nUSER: {{input}}\nASSISTANT: "
      output: "{{output}}"
  api_parallel_multiple:
    instruction_format:
      input: "SYSTEM: You are a helpful assistant with access to the following function calls. Your task is to produce a sequence of function calls necessary to generate response to the user utterance. Use the following function calls as required and return only function \"name\" with empty \"arguments\" dictionary in your response.\n<|function_call_library|>\n{{api_specifications}}\n\nUSER: {{input}}\nASSISTANT: "
      output: "{{output}}"
  nl2sql_orders:
    instruction_format:
      input: "{{instruction}}"
      output: "{{output}}"
dependencies:
  cot_transform:
    - api_single_detection
    - api_yes_no
    - api_parallel_multiple
    - nl2sql_orders